<!DOCTYPE html>
<html lang="es">

<head>
    <title>Mixamo Animation Controller</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tus estilos -->
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand mb-0 h1">Mixamo Controller</span>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="container-fluid">
        <div class="row">

            <!-- PANEL LATERAL -->
            <div class="col-md-3 bg-dark text-white p-4" style="height: 85vh;">

                <h4 class="mb-4">Controles</h4>

                <p><strong>1:</strong> Sitting</p>
                <p><strong>2:</strong> Sitting Thumbs Up</p>
                <p><strong>3:</strong> Snatch</p>
                <p><strong>4:</strong> Talking on Phone</p>
                <p><strong>5:</strong> Right Turn</p>

                <hr>

                <p class="small">
                    Modelo y animaciones desde 
                    <a href="https://www.mixamo.com/" target="_blank" class="text-info">Mixamo</a>
                </p>

            </div>

            <!-- VISOR THREE -->
            <div class="col-md-9 p-0">

                <div id="container" style="width: 100%; height: 85vh; position: relative;">

                    <!-- INFO SUPERIOR -->
                    <div id="info" style="
                        position: absolute;
                        top: 10px;
                        left: 10px;
                        background: rgba(0,0,0,0.5);
                        color: white;
                        padding: 10px;
                        border-radius: 8px;
                        font-size: 13px;
                    ">
                        <a href="https://threejs.org" target="_blank" class="text-info">three.js</a> + FBXLoader
                    </div>

                </div>

            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">Desarrollado por: Jesús (Ing. en Sistemas)</p>
        <p class="mb-0">© 2026 - Proyecto Three.js + Mixamo</p>
    </footer>

    <!-- IMPORTMAP -->
    <script type="importmap">
    {
        "imports": {
            "three": "./assets/builds/three.module.js",
            "three/addons/": "./assets/jsm/"
        }
    }
    </script>

    <!-- MAIN -->
    <script type="module" src="./assets/js/main.js"></script>

</body>

</html>
